<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Store Inventory</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>
    <h1>Product Inventory</h1>
    <div style="margin-bottom: 20px; padding: 15px; border: 1px solid #ccc;">
    <h3>Add New Product</h3>
    <input type="text" id="name" placeholder="Name">
    <input type="number" id="price" placeholder="Price">
    <input type="number" id="stock" placeholder="Stock">
    <button onclick="addProduct()">Add to Inventory</button>
</div>
    <button onclick="loadProducts()">Refresh Products</button>
    
    <table id="productTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Stock</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script>
        async function loadProducts() {
            // 1. The Handshake (Calling Bridge 1)
            const response = await fetch('http://localhost:3000/products');
            
            // 2. The Translation (Turning JSON back into a JS Object)
            const products = await response.json();
            
            
            const tableBody = document.querySelector('#productTable tbody');
            tableBody.innerHTML = ''; // Clear the table first

            // 3. The Render (Putting the data on the screen)
            products.forEach(product => {
                const row = `<tr>
                    <td>${product.id}</td>
                    <td>${product.name}</td>
                    <td>$${product.price}</td>
                    <td>${product.stock}</td>
                </tr>`;
                tableBody.innerHTML += row;
            });
        }
        // 2. The Delivery Function
    async function addProduct() {
        const name = document.getElementById('name').value;
        const price = document.getElementById('price').value;
        const stock = document.getElementById('stock').value;

        // The Handshake (POST request)
        const response = await fetch('http://localhost:3000/products', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, price, stock, category: 'General' })
        });

        if (response.ok) {
            alert('Product added!');
            loadProducts(); // Refresh the table automatically
        }
    }

        // Run automatically when page opens
        loadProducts();
    </script>
</body>
</html>
